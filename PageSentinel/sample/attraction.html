<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アトラクション予約</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; margin:0; padding:0; background:#f0f0f0; }
    header { background:#005f99; color:white; padding:16px; text-align:center; font-size:1.4rem; }
    main { padding:16px; max-width:400px; margin:0 auto; }
    .message { text-align:center; margin:24px 0; font-size:1.1rem; color:#333; }
    .slots { list-style:none; padding:0; margin:0; }
    .slots li { 
      margin:8px 0; 
    }
    .slots button {
      width:100%; padding:12px;
      font-size:1rem;
      border:1px solid #888; border-radius:4px;
      background:#fff; cursor:not-allowed;
    }
    .slots button.available {
      border-color:#006600; background:#e0ffe0; cursor:pointer;
    }
    .slots button.available:hover {
      background:#ccffcc;
    }
  </style>
</head>
<body>
  <header>アトラクション予約</header>
  <main>
    <div id="statusMessage" class="message">予約可能な時間帯はありません。</div>
    <ul id="slotList" class="slots">
      <li><button disabled>9:00～10:00</button></li>
      <li><button disabled>10:30～11:30</button></li>
      <li><button disabled>12:00～13:00</button></li>
      <li><button disabled>13:30～14:30</button></li>
      <li><button disabled>15:00～16:00</button></li>
    </ul>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // リロードするごとに「稀に」空きを発生させる
      // ここでは20%の確率でいずれか1枠を空きに
      if (Math.random() < 0.2) {
        const slotButtons = Array.from(document.querySelectorAll('#slotList button'));
        // ランダムな1枠を選択可能に
        const idx = Math.floor(Math.random() * slotButtons.length);
        slotButtons[idx].disabled = false;
        slotButtons[idx].classList.add('available');
        // 他のボタンはそのままdisabled
        document.getElementById('statusMessage').textContent = '予約したい時間帯を選択してください。';
      }
      
      // 空きボタンにクリック処理を追加
      document.querySelectorAll('#slotList button.available').forEach(btn => {
        btn.addEventListener('click', () => {
          alert(btn.textContent + ' を予約しました。');
          // 予約後、全ボタンをdisabledに戻しメッセージ更新
          document.getElementById('statusMessage').textContent = '予約完了しました。';
          document.querySelectorAll('#slotList button').forEach(b => {
            b.disabled = true;
            b.classList.remove('available');
          });
        });
      });
    });
  </script>
</body>
</html>
