<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5879758729873663"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <title>利用規約・プライバシーポリシー</title>
  <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#007aff;
      --bg:#f9f9f9;
      --card:#fff;
      --shadow:0 0 10px rgba(0,0,0,0.05);
      --radius:8px;
      --grad:linear-gradient(135deg,#007aff 0%,#5ac8fa 100%);
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);margin:0;
    }
    .container{
      max-width:600px;margin:80px auto 40px;padding:0 20px 40px;
      background:var(--card);box-shadow:var(--shadow);border-radius:var(--radius);
      position:relative;
    }

    /* タイトル右上の丸ボタン */
    .feature-fab{
      position:absolute;top:-28px;right:-28px;
      width:64px;height:64px;border-radius:50%;
      background:var(--grad);color:#fff;
      display:flex;justify-content:center;align-items:center;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
      text-decoration:none;font-size:.8rem;font-weight:600;
      transform:rotate(10deg);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .feature-fab:hover{
      transform:rotate(0deg) scale(1.05);
      box-shadow:0 10px 18px rgba(0,0,0,.22);
      text-decoration:none;
    }

    h1{
      font-size:1.5em;margin:1.2em 0 .6em;color:#222;
      border-bottom:1px solid #ddd;padding-bottom:.3em;
      text-align:center;
    }
    h1 a{color:inherit;text-decoration:none;}
    h2{font-size:1.2em;margin-top:1.5em;color:#333;}
    ul{padding-left:1.2em;margin:0;}
    li{margin-bottom:.5em;}
    a{color:var(--blue);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .timestamp{
      text-align:center;font-size:.8em;color:#666;margin-top:40px;padding-bottom:20px;
    }

    .speech-bubble2{
      position:relative;background:#f0f8ff;border:2px solid var(--blue);
      border-radius:15px;padding:12px 18px;width:fit-content;margin:0 auto 20px;
      font-weight:bold;font-size:1em;color:#333;
    }
    .speech-bubble{
      font-family:'Yomogi',cursive;
      position:relative;background:#f0f8ff;border:2px solid var(--blue);
      border-radius:20px;padding:16px;width:fit-content;max-width:80%;
      margin:0 auto 30px;font-size:1em;line-height:1.5;color:#333;font-weight:bold;
      box-shadow:0 4px 6px rgba(0,0,0,.1);
    }
    .speech-bubble::after{
      content:"";position:absolute;bottom:-20px;left:50%;margin-left:-10px;width:0;height:0;
      border:10px solid transparent;border-top-color:var(--blue);
    }

    .appstore-link{text-align:center;margin:20px 0;}

    /* 真ん中の大きいCTA */
    .feature-cta{
      margin:40px auto 10px;
      text-align:center;
    }
    .feature-cta a{
      display:inline-block;
      background:var(--grad);
      color:#fff;
      padding:14px 28px;
      border-radius:32px;
      font-size:1rem;
      font-weight:600;
      text-decoration:none;
      box-shadow:0 6px 14px rgba(0,0,0,.15);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .feature-cta a:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 18px rgba(0,0,0,.2);
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- タイトル右上の丸ボタン -->
    <a class="feature-fab" href="Marketing/index.html">機能<br>紹介</a>

    <h1>Page Sentinel</h1>

    <img src="PageSentinel.png" alt="Page Sentinel Mascot" width="300" height="300"
         style="display:block;margin:1em auto;">

    <!-- 中央の吹き出しなど既存装飾を活かすならここに置く -->
    <!-- <div class="speech-bubble">Page Sentinelへようこそ！</div> -->

    <!-- 中央の大きなCTA -->
    <div class="feature-cta">
      <a href="Marketing/index.html">▶ 機能紹介ページを見る</a>
    </div>

    <h2>日本語</h2>
    <ul>
      <li><a href="terms_ja.html">利用規約</a></li>
      <li><a href="privacy_ja.html">プライバシーポリシー</a></li>
    </ul>

    <div class="appstore-link">
      <a href="https://apps.apple.com/jp/app/id6746980444" target="_blank" rel="noopener">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
             alt="Download on the App Store" style="height:50px;">
      </a>
    </div>

    <div class="timestamp">
      <!-- 最終更新日などあればここに -->
    </div>

  </div>
</body>
</html>
